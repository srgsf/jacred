---
# Full example config (example.yaml). Copy to init.yaml or init.conf to use.
# Config priority: init.yaml > init.conf. If both exist, init.yaml is used.

listenip: any
listenport: 9117
apikey: "" # Ключ авторизации API (пусто — без проверки)
devkey: "" # Ключ для доступа к /dev/, /cron/, /jsondb за туннелем/прокси (пусто — только локальная сеть)
mergeduplicates: true
mergenumduplicates: true # Объединять дубликаты по номеру (серии и т.п.)
openstats: true
opensync: true
web: true # Раздавать статику (веб-интерфейс)
logFdb: true
logFdbRetentionDays: 7
logFdbMaxSizeMb: 0
logFdbMaxFiles: 0
logParsers: true
syncapi: https://sync.jacred.stream
synctrackers:
  - rutracker
  - rutor
  - kinozal
  - nnmclub
  - megapeer
  - bitru
  - toloka
  - mazepa
  - lostfilm
  - baibako
  - torrentby
  - selezen
  - animelayer
  - anidub
  - aniliberty
  - knaben
# Retired trackers — do not add to synctrackers; keep in disable_trackers
disable_trackers: []
syncsport: true
syncspidr: true
maxreadfile: 250
fdbPathLevels: 2 # Уровни вложенности каталогов fdb
tracks: false # Включить сбор метаданных треков (tsuri)
trackslog: true # Логи модуля tracks (Data/log/tracks.log)
trackscategory: jacred # Категория для торрентов из jacred (рекомендуется задавать уникально для каждого инстанса)
tracksdelay: 20000 # Задержка между запросами к tsuri, мс
tracksatempt: 20 # Количество неудачных попыток извлечь дорожки, после этого торрент исключается из tracks
tracksmod: 0 # Режим треков: 0 — все, 1 — только за текущие сутки
tracksinterval:
  task1: 60 # Интервал запуска задачи tracks за последние сутки, мин
  task0: 180 # Интервал запуска всех остальных задач, мин
tsuri:
  - http://127.0.0.1:8090
timeStatsUpdate: 15
timeSync: 120
timeSyncSpidr: 360
evercache:
  enable: false
  validHour: 1
  maxOpenWriteTask: 200
  dropCacheTake: 200

# Combined search (Lampa Jackett JSON, Torznab XML — shared pipeline)
search:
  mergeV1: auto # false | auto (v1 fuzzy только fuzzy mode) | true
  maxV1Pairs: 4 # Лимит v1-пар при mergeV1=auto в fuzzy mode
  v1Sort: sid # sid (seeders), pir, size; также IMDB/KP exact v1
  stripTrailingYear: true # Fuzzy: доп. запрос без года в конце
  skipCatFilter: true # Не фильтровать cat/Category[] на сервере (Lampa фильтрует сама)

# Torznab XML (Sonarr/Radarr/Prowlarr). Не влияет на Lampa Jackett JSON.
torznab:
  enable: true # false → 404 на /torznab/api и Prowlarr meta
  enrichTitles: true # Озвучки в Torznab XML <title>

# Console logging (journalctl). File logs: Data/log/* — logFdb, logParsers, trackslog (on by default).
logging:
  tracksConsoleDetail: false
  cronSkipFastMs: 100
  categories:
    parsers: None # parser detail → Data/log/{tracker}.log only

# Tracker settings (optional; defaults are used if omitted)
Rutor:
  host: http://rutor.info
  alias: "" # e.g. http://rutor....onion
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true

Megapeer:
  host: http://megapeer.vip
  alias: ""
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true

TorrentBy:
  host: https://torrent.by
  alias: "" # e.g. https://torrentby.workers.dev
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true

Kinozal:
  host: https://kinozal.guru
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true
  # Static session cookie (optional). If set, login.u/p are not required.
  # cookie: "uid=12345678; pass=XXXXXXXX;"
  login:
    u: ""
    p: ""

NNMClub:
  host: https://nnmclub.to
  alias: "" # e.g. http://nnmclub....onion
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true

# BitRu official API (cron: /cron/bitru/parse).
Bitru:
  host: https://bitru.org
  alias: ""
  useproxy: false
  log: true

Toloka:
  host: https://toloka.to
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true
  login:
    u: ""
    p: ""

Mazepa:
  host: https://mazepa.to
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true
  login:
    u: ""
    p: ""

Rutracker:
  host: https://rutracker.org
  alias: ""
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true

Selezen:
  host: https://open.selezen.org
  cookie: null
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true
  login:
    u: ""
    p: ""

Animelayer:
  host: https://animelayer.ru
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true
  cookie: "" # Статический cookie (если указан, используется вместо логина)
  login: # Альтернатива cookie: логин и пароль (предпочтительно)
    u: ""
    p: ""

Anidub:
  host: https://tr.anidub.com
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true

Aniliberty:
  host: https://aniliberty.top
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true

Knaben:
  host: https://api.knaben.org
  useproxy: false
  reqMinute: 120
  log: true

Baibako:
  host: http://baibako.tv
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true
  cookie: "PHPSESSID=your_session_id; uid=your_user_id; pass=your_pass_hash"
  login:
    u: ""
    p: ""

Lostfilm:
  host: https://www.lostfilm.tv
  cookie: "lf_loyal_person=0; lf_session=test_session_value; lf_udv=test_udv_value; PHPSESSID=test_phpsessid_value"
  useproxy: false
  reqMinute: 8
  parseDelay: 7000
  log: true

proxy:
  pattern: ""
  useAuth: false
  BypassOnLocal: false
  username: ""
  password: ""
  list:
    - ip:port
    - socks5://ip:port

globalproxy:
  - pattern: "\\.onion"
    useAuth: false
    BypassOnLocal: false
    username: ""
    password: ""
    list:
      - socks5://127.0.0.1:9050
