openapi: 3.0.3
info:
  title: JacRed API
  version: 1.0.0
  description: |
    Torrent aggregator API: Jackett-compatible search, native torrent search, Torznab XML,
    statistics, sync protocol, and configuration management.

    **Interactive docs:** [Swagger UI](/swagger)

    **Runtime OpenAPI JSON:** `/swagger/v1/swagger.json` (converted from this YAML file)

    **Static spec (this file):** `/openapi.yaml` (`wwwroot/openapi.yaml`)

    ## Authentication

    | Scheme | Usage |
    |--------|--------|
    | `apikey` query | Search, stats (when `apikey` is set in config) |
    | `X-Api-Key` header | Same as query apikey |
    | `Authorization: Bearer` | Same as apikey |
    | `X-Dev-Key` header | /dev/, /cron/, /jsondb, `/api/v1.0/config/*` из интернета или через туннель |

    **Config API** (`/api/v1.0/config/*`): LAN-клиент **или** `X-Dev-Key` / `?devkey=`.
    Same-host reverse proxy (Cloudflare Tunnel, nginx) **сам по себе не заменяет** devkey.

    **Sync** (`/sync/*`): middleware пропускает без ключей; данные sync требуют `opensync: true` в конфиге.

    Полная матрица: [`AccessTraceabilityMatrix.md`](AccessTraceabilityMatrix.md).

    ## Config files

    Application settings live in `init.yaml` (preferred) or `init.conf` (JSON). See `Data/example.yaml`.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: JacRed
    url: https://github.com/jacred-fdb/jacred

servers:
  - url: /
    description: Current host (default port 9117)

tags:
  - name: System
    description: Health, version, API key check
  - name: Search
    description: Jackett-compatible and native torrent search
  - name: Torznab
    description: Torznab XML for Sonarr/Radarr/Prowlarr
  - name: Stats
    description: Tracker statistics (requires openstats)
  - name: Sync
    description: Remote sync protocol (requires opensync)
  - name: Config
    description: init.yaml / init.conf read/write (LAN or X-Dev-Key)
  - name: Web
    description: PWA HTML shells

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: health
      security: []
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /version:
    get:
      tags: [System]
      summary: Build version info
      operationId: version
      security: []
      responses:
        '200':
          description: Version metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

  /lastupdatedb:
    get:
      tags: [System]
      summary: Last FileDB update time
      operationId: lastUpdateDb
      security: []
      responses:
        '200':
          description: Last update timestamp
          content:
            application/json:
              schema:
                type: object
                properties:
                  lastupdatedb:
                    type: string
                    example: '04.07.2026 15:30'

  /api/v1.0/conf:
    get:
      tags: [System]
      summary: Validate API key
      description: Returns whether the provided apikey matches server configuration. Whitelisted without apikey.
      operationId: checkApiKey
      security: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyQuery'
      responses:
        '200':
          description: Key validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  apikey:
                    type: boolean
                    description: true if key is valid or server has no apikey configured

  /api/v2.0/indexers/{status}/results:
    get:
      tags: [Search]
      summary: Jackett-compatible search
      operationId: jackettSearch
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            example: all
        - $ref: '#/components/parameters/ApiKeyQuery'
        - name: query
          in: query
          schema:
            type: string
        - name: title
          in: query
          schema:
            type: string
        - name: title_original
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
        - name: is_serial
          in: query
          schema:
            type: integer
            description: '-1 unknown, 1 movie, 2 serial, 3 tvshow, 4 doc, 5 anime'
        - name: Tracker[]
          in: query
          schema:
            type: array
            items:
              type: string
          description: Jackett-style filter by internal tracker id (e.g. kinozal, rutracker)
        - name: tracker
          in: query
          schema:
            type: string
          description: Single-tracker alias for Tracker[]
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JackettRootObject'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1.0/torrents:
    get:
      tags: [Search]
      summary: Native torrent search
      operationId: torrentsSearch
      parameters:
        - $ref: '#/components/parameters/ApiKeyQuery'
        - name: search
          in: query
          required: true
          schema:
            type: string
        - name: altname
          in: query
          schema:
            type: string
        - name: exact
          in: query
          schema:
            type: boolean
        - name: type
          in: query
          schema:
            type: string
            description: movie, serial, anime, etc.
        - name: sort
          in: query
          schema:
            type: string
            enum: [sid, pir, size, create, update]
        - name: tracker
          in: query
          schema:
            type: string
        - name: voice
          in: query
          schema:
            type: string
        - name: videotype
          in: query
          schema:
            type: string
        - name: relased
          in: query
          schema:
            type: integer
        - name: quality
          in: query
          schema:
            type: integer
        - name: season
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Torrent map keyed by URL
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/TorrentListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1.0/qualitys:
    get:
      tags: [Search]
      summary: Quality aggregation by title
      operationId: qualitys
      parameters:
        - $ref: '#/components/parameters/ApiKeyQuery'
        - name: name
          in: query
          schema:
            type: string
        - name: originalname
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: take
          in: query
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: Quality map
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /torznab/api:
    get:
      tags: [Torznab]
      summary: Torznab API (caps, search)
      description: Native Torznab XML when torznab.enable is true.
      operationId: torznabRoot
      parameters:
        - $ref: '#/components/parameters/ApiKeyQuery'
        - name: t
          in: query
          schema:
            type: string
            enum: [caps, indexers, search, tvsearch, movie, tv]
        - name: q
          in: query
          schema:
            type: string
        - name: cat
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Torznab XML
          content:
            application/xml:
              schema:
                type: string
        '404':
          description: Torznab disabled

  /api/v2.0/indexers/{indexer}/results/torznab/api:
    get:
      tags: [Torznab]
      summary: Torznab API (indexer path)
      operationId: torznabIndexer
      parameters:
        - name: indexer
          in: path
          required: true
          schema:
            type: string
            example: all
        - $ref: '#/components/parameters/ApiKeyQuery'
        - name: t
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Torznab XML
          content:
            application/xml:
              schema:
                type: string

  /api/v2.0/indexers:
    get:
      tags: [Torznab]
      summary: List configured indexers (Jackett/Prowlarr)
      operationId: indexersList
      security: []
      responses:
        '200':
          description: Indexer list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/v1/indexer:
    get:
      tags: [Torznab]
      summary: Prowlarr indexer list
      description: |
        Prowlarr-compatible indexer list for discover clients (qui, autobrr) and Prowlarr apps.
        Returns a JSON array with `enable: true` and `protocol: torrent`.
      operationId: prowlarrIndexerList
      parameters:
        - $ref: '#/components/parameters/ApiKeyQuery'
        - name: X-Api-Key
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Enabled torrent indexers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProwlarrIndexer'
        '404':
          description: Torznab disabled

  /api/v1/indexer/{indexerId}:
    get:
      tags: [Torznab]
      summary: Prowlarr indexer detail
      description: |
        Prowlarr-compatible indexer detail for qui tracker domain resolution (backend=prowlarr).
        JacRed exposes a single aggregate indexer with `id=1`.
      operationId: prowlarrIndexerDetail
      parameters:
        - name: indexerId
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - $ref: '#/components/parameters/ApiKeyQuery'
      responses:
        '200':
          description: Indexer detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProwlarrIndexerDetail'
        '404':
          description: Torznab disabled or unknown indexer id

  /api/v1/indexer/{indexerId}/newznab:
    get:
      tags: [Torznab]
      summary: Prowlarr Torznab proxy
      description: |
        Prowlarr-compatible Torznab endpoint (`t=caps`, `search`, `tvsearch`, `moviesearch`).
        Same handler as `/torznab/api` and Jackett alias paths.
      operationId: prowlarrNewznab
      parameters:
        - name: indexerId
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - $ref: '#/components/parameters/ApiKeyQuery'
        - name: t
          in: query
          schema:
            type: string
            enum: [caps, indexers, search, tvsearch, movie, tv, moviesearch]
        - name: q
          in: query
          schema:
            type: string
        - name: cat
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Torznab XML
          content:
            application/xml:
              schema:
                type: string
        '404':
          description: Torznab disabled

  /stats/Torrents:
    get:
      tags: [Stats]
      summary: Tracker summary (stats.json)
      description: 'All trackers from Data/temp/stats.json. Used by web UI `/stats`. Requires `openstats: true`.'
      operationId: statsTorrents
      parameters:
        - $ref: '#/components/parameters/ApiKeyQuery'
      responses:
        '200':
          description: Tracker summary array
          content:
            application/json:
              schema:
                type: array

  /stats/tracks:
    get:
      tags: [Stats]
      summary: Tracks export aggregate (tracks-stats.json cache)
      description: 'Read-only cache from Data/temp/tracks-stats.json. Requires `openstats: true`. Force refresh via `/dev/TracksStats?refresh=true`.'
      operationId: statsTracks
      parameters:
        - $ref: '#/components/parameters/ApiKeyQuery'
        - name: includeTorrentDb
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Tracks export aggregate
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  updatedAt:
                    type: string
                    format: date-time
                  fromCache:
                    type: boolean
                  stats:
                    type: object

  /stats/meta:
    get:
      tags: [Stats]
      summary: Last stats collection time
      description: 'Requires `openstats: true`. Returns updatedAt for stats.json and tracks-stats.json. Used by web UI `/stats`.'
      operationId: statsMeta
      parameters:
        - $ref: '#/components/parameters/ApiKeyQuery'
      responses:
        '200':
          description: Collection timestamps
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  updatedAt:
                    type: string
                    format: date-time
                  updatedAtLocal:
                    type: string
                  tracksStatsUpdatedAt:
                    type: string
                    format: date-time

  /sync/conf:
    get:
      tags: [Sync]
      summary: Sync protocol metadata
      operationId: syncConf
      security: []
      responses:
        '200':
          description: Sync capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  fbd:
                    type: boolean
                  spidr:
                    type: boolean
                  version:
                    type: integer

  /sync/fdb:
    get:
      tags: [Sync]
      summary: Sync FileDB key listing
      operationId: syncFdb
      security: []
      description: 'Requires `opensync: true` in server config.'
      parameters:
        - name: key
          in: query
          schema:
            type: string
      responses:
        '200':
          description: FDB sync payload

  /sync/fdb/torrents:
    get:
      tags: [Sync]
      summary: Sync FileDB torrent collections
      description: 'Returns torrent batches changed after `time`. Supports spidr mode and incremental `start`. Requires `opensync: true`.'
      operationId: syncFdbTorrents
      security: []
      parameters:
        - name: time
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: start
          in: query
          schema:
            type: integer
            format: int64
            default: -1
        - name: spidr
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Collections with nextread pagination flag
          content:
            application/json:
              schema:
                type: object

  /api/v1.0/config:
    get:
      tags: [Config]
      summary: Get current configuration
      description: |
        Returns parsed config as JSON object and serialized content (secrets included).
        **LAN or valid X-Dev-Key** (same-host proxy alone is not sufficient).
      operationId: configGet
      security:
        - DevKeyHeader: []
      parameters:
        - name: format
          in: query
          description: Serialization format for content field
          schema:
            type: string
            enum: [yaml, json]
            default: yaml
      responses:
        '200':
          description: Configuration payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigGetResponse'
        '401':
          description: Invalid or missing devkey
        '403':
          description: Forbidden (LAN or devkey required)

    post:
      tags: [Config]
      summary: Save configuration
      description: Writes to init.yaml or init.conf. Hot-reload within ~10s. **LAN or valid X-Dev-Key.**
      operationId: configSave
      security:
        - DevKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigSaveRequest'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSaveResponse'
        '401':
          description: Invalid devkey
        '403':
          description: Forbidden (LAN or devkey required)

  /api/v1.0/config/schema:
    get:
      tags: [Config]
      summary: Form schema for settings UI
      operationId: configSchema
      security:
        - DevKeyHeader: []
      responses:
        '200':
          description: Field groups and validation metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  schema:
                    $ref: '#/components/schemas/ConfigFormSchema'

  /api/v1.0/config/validate:
    post:
      tags: [Config]
      summary: Validate configuration without saving
      operationId: configValidate
      security:
        - DevKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigSaveRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidationResponse'

  /api/v1.0/config/diff:
    post:
      tags: [Config]
      summary: Diff proposed config vs current
      description: Used by settings UI before save confirmation.
      operationId: configDiff
      security:
        - DevKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigSaveRequest'
      responses:
        '200':
          description: Diff entries and validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigDiffResponse'

  /api/v1.0/config/render:
    post:
      tags: [Config]
      summary: Serialize form data to YAML/JSON
      description: Form ↔ raw editor sync (settings UI).
      operationId: configRender
      security:
        - DevKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  additionalProperties: true
                format:
                  type: string
                  enum: [yaml, json]
                  default: yaml
      responses:
        '200':
          description: Formatted text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigRenderResponse'

  /api/v1.0/config/parse:
    post:
      tags: [Config]
      summary: Parse YAML/JSON text to JSON object
      operationId: configParse
      security:
        - DevKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                format:
                  type: string
                  enum: [yaml, json]
      responses:
        '200':
          description: Parsed configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    additionalProperties: true

  /api/v1.0/config/format:
    post:
      tags: [Config]
      summary: Pretty-print config after AppInit normalization
      description: Validates, normalizes through AppInit model, returns formatted YAML/JSON.
      operationId: configFormat
      security:
        - DevKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigSaveRequest'
      responses:
        '200':
          description: Normalized data and formatted text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigFormatResponse'

  /openapi.yaml:
    get:
      tags: [System]
      summary: OpenAPI specification (YAML)
      operationId: openApiYaml
      security: []
      responses:
        '200':
          description: This document
          content:
            application/yaml:
              schema:
                type: string

  /:
    get:
      tags: [Web]
      summary: Search PWA
      operationId: webSearch
      security: []
      responses:
        '200':
          description: HTML
          content:
            text/html:
              schema:
                type: string

  /stats:
    get:
      tags: [Web]
      summary: Statistics PWA
      operationId: webStats
      security: []
      responses:
        '200':
          description: HTML
          content:
            text/html:
              schema:
                type: string

  /settings:
    get:
      tags: [Web]
      summary: Settings PWA
      operationId: webSettings
      security: []
      responses:
        '200':
          description: HTML
          content:
            text/html:
              schema:
                type: string

components:
  securitySchemes:
    ApiKeyQuery:
      type: apiKey
      in: query
      name: apikey
      description: API key (when configured in init.yaml)
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-Api-Key
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: API key as Bearer token
    DevKeyHeader:
      type: apiKey
      in: header
      name: X-Dev-Key
      description: Admin/dev key — required from internet or tunnel when `devkey` is set; LAN clients may omit it.

  parameters:
    ApiKeyQuery:
      name: apikey
      in: query
      required: false
      schema:
        type: string
      description: API key (alternative — X-Api-Key header or Bearer)

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: OK

    VersionResponse:
      type: object
      properties:
        version:
          type: string
        gitSha:
          type: string
        gitBranch:
          type: string
        buildDate:
          type: string

    ProwlarrIndexer:
      type: object
      description: Prowlarr /api/v1/indexer list item
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
        description:
          type: string
        implementation:
          type: string
          example: Torznab
        implementationName:
          type: string
          example: Torznab
        enable:
          type: boolean
        protocol:
          type: string
          enum: [unknown, usenet, torrent]
          example: torrent

    ProwlarrIndexerDetail:
      type: object
      description: Prowlarr /api/v1/indexer/{id} detail response
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
        description:
          type: string
        implementation:
          type: string
        implementationName:
          type: string
        enable:
          type: boolean
        fields:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value: {}

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string

    ConfigSaveRequest:
      type: object
      description: Provide either `data` (JSON object) or `content` (YAML/JSON string)
      properties:
        data:
          type: object
          description: Parsed configuration object (preferred for form UI)
          additionalProperties: true
        content:
          type: string
          description: Raw init.yaml or init.conf text
        format:
          type: string
          enum: [yaml, json]
          description: Format hint for content or output file

    ConfigGetResponse:
      type: object
      properties:
        ok:
          type: boolean
        path:
          type: string
          example: init.yaml
        format:
          type: string
          enum: [yaml, json]
        displayFormat:
          type: string
        exists:
          type: boolean
        lastModifiedUtc:
          type: string
          format: date-time
        data:
          type: object
          description: Parsed config (includes secrets; LAN or devkey)
          additionalProperties: true
        content:
          type: string
          description: Serialized config text
        schema:
          $ref: '#/components/schemas/ConfigFormSchema'
        sensitiveFields:
          type: array
          items:
            type: string
        note:
          type: string

    ConfigSaveResponse:
      type: object
      properties:
        ok:
          type: boolean
        path:
          type: string
        format:
          type: string
        lastModifiedUtc:
          type: string
          format: date-time
        message:
          type: string

    ConfigValidationResponse:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
        errors:
          type: array
          items:
            type: string
          description: Blocking validation errors
        warnings:
          type: array
          items:
            type: string
          description: Non-blocking warnings

    ConfigDiffEntry:
      type: object
      properties:
        path:
          type: string
          example: listenport
        oldValue:
          type: string
          nullable: true
        newValue:
          type: string
          nullable: true
        sensitive:
          type: boolean
        change:
          type: string
          enum: [added, removed, changed]

    ConfigDiffResponse:
      type: object
      properties:
        ok:
          type: boolean
        diffs:
          type: array
          items:
